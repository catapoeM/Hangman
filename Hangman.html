<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">

    <title>Hangman</title>
  </head>
  <body>
    <div class="card text-center">
      <div class="card-header">
        By Catalin Poenaru
      </div>
      <div class="card-body">
        <h1 class="card-title">Hangman</h1>
      </div>
    </div>
      <div class="card text-center">
        <div class="mb-3">
          <input type="text" id="addWord" name="name" required
            minlength="2" maxlength="22" />
          <div class="card-body">
            <button type="submit" class="btn btn-primary" onclick="return addWord();">Add word</button>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="text-center">
          Pick a letter and try to guess the word!
        </div>
      </div>
      <div id="alphabet">
      </div>
      <div class="card-body">
        <div id="theLetters">
        </div>
      </div>
      <div class="card-body">
        <div id="buttonsHolder"></div>
      </div>
      <div id="name"></div> 
      
    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <!--
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.bundle.min.js" integrity="sha384-b5kHyXgcpbZJO/tY9Ul7kGkf1S0CWuKcCD38l8YkeH8z8QjE0GmW1gYU5S9FOnJ0" crossorigin="anonymous"></script>
    -->
    <!-- Option 2: Separate Popper and Bootstrap JS -->
    
    <script src="https://code.jquery.com/jquery-3.5.0.js" ></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.6.0/dist/umd/popper.min.js" integrity="sha384-KsvD1yqQ1/1+IA7gi3P0tyJcT3vR+NdBTt13hSJ2lnve8agRGXTTyNaBYmCR/Nwi" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.min.js" integrity="sha384-nsg8ua9HAw1y0W1btsyWgBklPnCUAFLuTMS2G72MMONqmOymq585AcH49TLBQObG" crossorigin="anonymous"></script>
    

    <script type="text/javascript">
      var word, answerArray = [];
      function addWord() {
        word = $('#addWord').val();
        for (var i = 0; i < word.length; ++i) {
          answerArray[i] = "_";
        }
        var remainingLetters = word.length;
        var p, letter, button, holder;
        holder = document.getElementById("buttonsHolder");
        for (var i = 97; i <= 122; ++i) {
          p = document.createElement("p");
          letter = String.fromCharCode(i);
          button = document.createElement("button");
          button.innerHTML = letter;
          button.setAttribute("data-letter", letter);
          button.onclick = function(e) {setLetter(this.getAttribute("data-letter")); };
          p.appendChild(button);
          holder.appendChild(p);
        }
        alert(word);
      }
      function setLetter(letter) {
        var div = document.getElementById("name");
        div.innerHTML = letter;
        for (var i = 0; i < word.length; ++i) {
          if (word[i] == div.innerHTML) {
            alert(answerArray);
            answerArray[i] = div.innerHTML;
          }
        }
      }
    </script>
  </body>
</html>
